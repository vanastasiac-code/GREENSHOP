<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/main.css">
    <title>Green shop</title>
</head>
<body>
    <div class="container">
        <header class="header">
            <strong class="logo">
                <img class="logo_img" src="images/logo.svg" alt="logo">
                <h2>GREENSHOP</h2>
            </strong>
            <nav class="nav">
                <ul class="menu">
                    <li>
                        <a class="navigation_item" href="#">Home</a>
                    </li>
                    <li>
                        <a class="navigation_item" href="#">Shop</a>
                    </li>
                    <li>
                        <a class="navigation_item" href="#">Plant Care</a>
                    </li>
                    <li>
                        <a class="navigation_item" href="#">Blogs</a>
                    </li>
                </ul>
            </nav>
            <div class="login">
                <a class="btn btn_nav" href="register.html">
                    <img src="images/login_icon.svg" alt="login">
                    Login
                </a>
            </div>
        </header>
        <main>
            <section class="intro">
                <div class="intro_content">
                    <p class="intro_content_welcome">Welcome to GreenShop</p>
                    <h1>Let’s Make a Better <span>Planet</span></h1>
                    <p class="intro_content_text">
                        We are an online plant shop offering a wide range of cheap and trendy plants. Use our plants to create an unique Urban Jungle. Order your favorite plants!
                    </p>
                    <button class="btn btn_intro">SHOP NOW</button>
                </div>
                <img class="intro_img" src="images/img-banner.png" alt="banner">
            </section>
        </main>
    </div>

</html>
